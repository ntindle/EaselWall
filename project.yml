name: EaselWall
configs:
  Debug: debug
  Release: release
  AppStore: release
options:
  bundleIdPrefix: com.ntindle
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Release
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  EaselWall:
    type: application
    platform: macOS
    sources:
      - path: Sources/EaselWall
      - path: Sources/Shared
      - path: Resources/Paintings
        type: folder
        buildPhase: resources
      - path: Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: EaselWallControlWidget
      - package: Sparkle
        product: Sparkle
    info:
      path: Sources/EaselWall/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: "EaselWall"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUFeedURL: "https://easelwall.com/appcast.xml"
        SUPublicEDKey: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ntindle.EaselWall
        PRODUCT_NAME: "EaselWall"
        INFOPLIST_FILE: Sources/EaselWall/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_ENTITLEMENTS: EaselWall.entitlements
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_ENTITLEMENTS: EaselWall.entitlements
          CODE_SIGN_STYLE: Automatic
        AppStore:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGN_ENTITLEMENTS: EaselWall-AppStore.entitlements
          CODE_SIGN_STYLE: Manual
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPSTORE

  EaselWallControlWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/ControlWidget
      - path: Sources/Shared
    info:
      path: Sources/ControlWidget/Info.plist
      properties:
        CFBundleDisplayName: "EaselWall Widget"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ntindle.EaselWall.ControlWidget
        PRODUCT_NAME: "EaselWallControlWidget"
        INFOPLIST_FILE: Sources/ControlWidget/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_ENTITLEMENTS: EaselWallControlWidget.entitlements
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_ENTITLEMENTS: EaselWallControlWidget.entitlements
          CODE_SIGN_STYLE: Automatic
        AppStore:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGN_ENTITLEMENTS: EaselWallControlWidget-AppStore.entitlements
          CODE_SIGN_STYLE: Manual
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPSTORE
