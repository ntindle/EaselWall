name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Remove ControlWidget dependency (requires macOS 26 SDK)
        run: |
          python3 -c "
          import json
          with open('project.yml') as f:
              content = f.read()
          # Remove the widget dependency from the main target for CI
          content = content.replace(\"    dependencies:\\n      - target: EaselWallControlWidget\\n\", \"\")
          with open('project.yml', 'w') as f:
              f.write(content)
          "
          xcodegen generate

      - name: Build (Debug)
        run: |
          xcodebuild -project EaselWall.xcodeproj \
            -target EaselWall \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_ENTITLEMENTS="" \
            build
